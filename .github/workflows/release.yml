name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GODOT_VERSION: 4.6.3
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  export-and-release:
    name: Export, Build & Push
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/* \
                ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ || true

      - name: Export Linux server binary
        run: |
          mkdir -p export/server
          godot --headless --export-release "Linux" export/server/FishGambleGame.x86_64

      - name: Export Web client
        run: |
          mkdir -p export/web
          godot --headless --export-release "Web" export/web/index.html

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Upload web export to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: export/web/**
          generate_release_notes: true
